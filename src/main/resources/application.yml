spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: ${APP_NAME:feature-flag}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.example.feature.flag: INFO
    org.springframework: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
