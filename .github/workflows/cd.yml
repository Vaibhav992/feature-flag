name: CD Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  APP_NAME: feature-flag
  APP_DIR: /opt/feature-flag
  JAR_NAME: feature-flag-0.0.1-SNAPSHOT.jar

jobs:
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: |
          chmod +x mvnw
          ./mvnw -B clean package -DskipTests

      - name: Copy JAR to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          source: target/${{ env.JAR_NAME }}
          target: /tmp

      - name: Deploy and restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          script: |
            set -euo pipefail

            APP_DIR="${{ env.APP_DIR }}"
            APP_NAME="${{ env.APP_NAME }}"
            JAR_NAME="${{ env.JAR_NAME }}"
            SERVICE_FILE="/etc/systemd/system/${APP_NAME}.service"
            JAR_SOURCE="/tmp/target/${JAR_NAME}"

            if [ ! -f "${JAR_SOURCE}" ]; then
              JAR_SOURCE="/tmp/${JAR_NAME}"
            fi

            if [ ! -f "${JAR_SOURCE}" ]; then
              echo "JAR file not found on server."
              exit 1
            fi

            if ! command -v java >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y openjdk-21-jre
            fi

            sudo mkdir -p "${APP_DIR}"
            sudo mv "${JAR_SOURCE}" "${APP_DIR}/app.jar"
            sudo chown -R "${USER}:${USER}" "${APP_DIR}"

            sudo bash -c "cat > ${SERVICE_FILE}" <<EOF
            [Unit]
            Description=Feature Flag Service
            After=network.target

            [Service]
            Type=simple
            User=${USER}
            WorkingDirectory=${APP_DIR}
            EnvironmentFile=${APP_DIR}/.env
            ExecStart=/usr/bin/java -jar ${APP_DIR}/app.jar
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable "${APP_NAME}"
            sudo systemctl restart "${APP_NAME}"

            for i in $(seq 1 45); do
              code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8080/api/v1/flags/UNKNOWN" || true)
              if [ "${code}" = "200" ] || [ "${code}" = "404" ]; then
                echo "Deploy successful."
                exit 0
              fi
              sleep 2
            done

            echo "Health check failed. Service logs:"
            sudo systemctl status "${APP_NAME}" --no-pager -l || true
            sudo journalctl -u "${APP_NAME}" -n 100 --no-pager
            exit 1
